services:
  backend: 
    build: ./backend
    ports:
      - 3001:3001
    volumes:
      - ./backend:/app-backend 
    container_name: backend_typescript
    restart: always
    depends_on:
      - db

  db:
    image: postgres:16.0-alpine
    ports:
      - 5432:5432
    env_file:
      - .env.db
    container_name: database
    restart: always